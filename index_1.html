<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Batnorton — Колесо фортуны</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --black: #0a0a0a;
    --charcoal: #1a1a1a;
    --smoke-1: #2b2b2e;
    --smoke-2: #4a4a4f;
    --smoke-3: #8c8c92;
    --fog: #c9c9cd;
    --white: #f4f4f2;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at 50% -10%, #232326 0%, var(--black) 65%);
    color: var(--white);
    font-family: "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif JP", Georgia, "Segoe UI", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: 0;
    opacity: .10;
    pointer-events: none;
    background-image: radial-gradient(circle at center, transparent 58%, var(--fog) 60%, transparent 62%);
    background-size: 60px 60px;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 1px;
    margin: 8px 0 0;
    text-align: center;
    z-index: 1;
  }
  .kanji {
    font-size: 13px;
    letter-spacing: 6px;
    color: var(--smoke-3);
    margin-top: 2px;
  }
  .subtitle {
    color: var(--smoke-3);
    font-size: 14px;
    margin: 10px 0 6px;
    text-align: center;
    z-index: 1;
  }
  .hint {
    color: var(--smoke-2);
    font-size: 12px;
    margin-bottom: 16px;
    text-align: center;
    z-index: 1;
  }
  .wheel-wrap {
    position: relative;
    width: 320px;
    height: 320px;
    margin: 10px auto 26px;
    z-index: 1;
  }
  .pointer {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-top: 20px solid var(--fog);
    z-index: 5;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,.6));
  }
  #wheel {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    display: block;
    box-shadow: 0 0 0 7px var(--charcoal), 0 0 0 8px var(--smoke-2), 0 10px 34px rgba(0,0,0,.65);
    transition: transform 5s cubic-bezier(.17,.67,.16,1);
    cursor: pointer;
  }
  .hub {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 56px;
    height: 56px;
    background: radial-gradient(circle at 35% 30%, var(--fog), var(--smoke-2) 70%);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: 0 0 0 4px var(--black);
    z-index: 4;
    pointer-events: none;
  }
  button#spin {
    background: linear-gradient(135deg, var(--smoke-2), var(--charcoal));
    color: var(--white);
    border: 1px solid var(--smoke-3);
    font-size: 16px;
    letter-spacing: 2px;
    font-weight: 600;
    padding: 14px 38px;
    border-radius: 4px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(0,0,0,.5);
    transition: transform .15s ease, opacity .3s ease;
    z-index: 1;
  }
  button#spin:active { transform: scale(0.96); }
  button#spin:disabled { opacity: .5; cursor: default; }

  .result-overlay {
    position: fixed;
    inset: 0;
    background: rgba(6,6,7,.94);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 24px;
    z-index: 50;
    animation: fadeIn .4s ease forwards;
  }
  .result-overlay.show { display: flex; }
  .result-card {
    background: linear-gradient(160deg, var(--charcoal), var(--black));
    border: 1px solid var(--smoke-2);
    border-radius: 6px;
    padding: 30px 26px;
    max-width: 320px;
    box-shadow: 0 20px 60px rgba(0,0,0,.7);
  }
  .result-emoji { font-size: 50px; margin-bottom: 12px; }
  .result-photo {
    width: 140px;
    height: 140px;
    object-fit: cover;
    border-radius: 6px;
    border: 1px solid var(--smoke-2);
    margin: 4px auto 16px;
    display: block;
  }
  .result-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 8px;
    color: var(--white);
  }
  .result-title .accent-line {
    display: block;
    width: 40px;
    height: 1px;
    background: var(--smoke-3);
    margin: 10px auto;
  }
  .result-text {
    color: var(--fog);
    font-size: 15px;
    line-height: 1.6;
    margin-bottom: 22px;
  }
  .result-btn {
    background: var(--fog);
    color: var(--black);
    border: none;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 12px 28px;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
  }
  .result-btn.secondary {
    background: transparent;
    color: var(--fog);
    border: 1px solid var(--smoke-2);
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .petal {
    position: fixed;
    top: -10px;
    z-index: 60;
    pointer-events: none;
  }
</style>
</head>
<body>

<h1>Batnorton</h1>
<div class="kanji">運 命 の 輪</div>
<div class="subtitle">Специально для тебя — крути колесо судьбы</div>
<div class="hint">Нажми на сектор, чтобы посмотреть приз поближе</div>

<div class="wheel-wrap">
  <div class="pointer"></div>
  <canvas id="wheel" width="640" height="640"></canvas>
  <div class="hub">扇</div>
</div>

<button id="spin">КРУТИТЬ</button>

<!-- Попап с описанием приза при нажатии на сектор -->
<div class="result-overlay" id="infoOverlay">
  <div class="result-card">
    <div class="result-emoji" id="info-emoji"></div>
    <img class="result-photo" id="info-photo" style="display:none;">
    <div class="result-title" id="info-title">
      <span id="info-title-text"></span>
      <span class="accent-line"></span>
    </div>
    <div class="result-text" id="info-text"></div>
    <button class="result-btn secondary" onclick="closeInfo()">Закрыть</button>
  </div>
</div>

<!-- Попап результата спина -->
<div class="result-overlay" id="overlay">
  <div class="result-card">
    <div class="result-emoji">🎴</div>
    <div class="result-title">
      Подарочная карта
      <span class="accent-line"></span>
    </div>
    <div class="result-text" id="result-text">
      С днём рождения, любовь моя! 🥳<br><br>
      Это не просто карта — это твой подарок от меня.
      Всё остальное расскажу лично 😉❤️
    </div>
    <button class="result-btn" onclick="closeOverlay()">УРА</button>
  </div>
</div>

  // Призы на колесе. lines — короткая подпись на самом колесе (1-2 строки).
  // desc / img — то, что показывается во всплывающем окне при нажатии на сектор.
  const prizes = [
    {
      lines: ["Скидка", "20%"], color: "#2b2b2e", text: "#f4f4f2",
      emoji: "🏷️", desc: "Скидка 20% на любую вещь из новой коллекции Batnorton."
    },
    {
      lines: ["Футболка", "в подарок"], color: "#c9c9cd", text: "#0a0a0a",
      img: TSHIRT_IMG, desc: "Футболка Batnorton в подарок — оверсайз, плотный хлопок, принт в фирменном стиле."
    },
    {
      lines: ["Скидка", "45%"], color: "#4a4a4f", text: "#f4f4f2",
      emoji: "🔥", desc: "Скидка 45% — специальное предложение только для победителей колеса."
    },
    {
      lines: ["Подарочная", "карта"], color: "#f4f4f2", text: "#0a0a0a", isMain: true,
      emoji: "🎴", desc: "Подарочная карта Batnorton — главный приз колеса фортуны."
    },
    {
      lines: ["Худи", "в подарок"], color: "#3a3a3e", text: "#f4f4f2",
      img: HOODIE_IMG, desc: "Худи Batnorton в подарок — тёплое, свободного кроя, с авторским принтом."
    },
    {
      lines: ["Скидка", "10%"], color: "#8c8c92", text: "#0a0a0a",
      emoji: "🏷️", desc: "Скидка 10% на любой заказ в магазине Batnorton."
    },
  ];

  const segAngle = 360 / prizes.length;

  const canvas = document.getElementById('wheel');
  const ctx = canvas.getContext('2d');
  const R = canvas.width / 2;

  function drawWheel() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    prizes.forEach((p, i) => {
      const startDeg = i * segAngle - 90;
      const endDeg = (i + 1) * segAngle - 90;
      const start = startDeg * Math.PI / 180;
      const end = endDeg * Math.PI / 180;
      const mid = (start + end) / 2;

      // сектор
      ctx.beginPath();
      ctx.moveTo(R, R);
      ctx.arc(R, R, R, start, end);
      ctx.closePath();
      ctx.fillStyle = p.color;
      ctx.fill();
      ctx.strokeStyle = "rgba(0,0,0,0.35)";
      ctx.lineWidth = 2;
      ctx.stroke();

      // Разворот текста на 180°, если иначе он был бы вверх ногами
      const midDeg = mid * 180 / Math.PI;
      const norm = ((midDeg % 360) + 360) % 360;
      const flip = norm > 90 && norm < 270;

      ctx.save();
      ctx.translate(R, R);
      ctx.rotate(flip ? mid + Math.PI : mid);
      const sign = flip ? -1 : 1;
      ctx.textAlign = flip ? "left" : "right";

      const textX = sign * (R - 24);
      ctx.fillStyle = p.text;
      ctx.font = p.isMain ? "700 26px Georgia, serif" : "600 25px Georgia, serif";
      const lineCount = p.lines.length;
      const startY = -((lineCount - 1) * 27) / 2 + 8;
      p.lines.forEach((line, li) => {
        ctx.fillText(line, textX, startY + li * 27);
      });
      ctx.restore();
    });

    ctx.beginPath();
    ctx.arc(R, R, R - 2, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(244,244,242,0.25)";
    ctx.lineWidth = 3;
    ctx.stroke();
  }
  drawWheel();

  const GUARANTEED_INDEX = prizes.findIndex(p => p.isMain);

  let spinning = false;
  let currentRotationDeg = 0; // текущий угол поворота колеса (для определения сектора по клику)
  const spinBtn = document.getElementById('spin');
  const overlay = document.getElementById('overlay');
  const wheelEl = document.getElementById('wheel');

  spinBtn.addEventListener('click', () => {
    if (spinning) return;
    spinning = true;
    spinBtn.disabled = true;
    if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

    const targetCenter = GUARANTEED_INDEX * segAngle + segAngle / 2;
    const jitter = (Math.random() - 0.5) * (segAngle * 0.5);
    const fullSpins = 5 + Math.floor(Math.random() * 3);
    const finalRotation = fullSpins * 360 + (360 - targetCenter - jitter);

    wheelEl.style.transform = `rotate(${finalRotation}deg)`;
    currentRotationDeg = finalRotation;

    setTimeout(() => {
      spinning = false;
      showResult();
      if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
      launchPetals();
    }, 5200);
  });

  function showResult() {
    overlay.classList.add('show');
  }
  function closeOverlay() {
    overlay.classList.remove('show');
    // tg?.sendData(JSON.stringify({ prize: "gift_card" }));
  }

  // ---- Нажатие на сектор колеса -> показать описание и фото ----
  const infoOverlay = document.getElementById('infoOverlay');
  const infoEmoji = document.getElementById('info-emoji');
  const infoPhoto = document.getElementById('info-photo');
  const infoTitleText = document.getElementById('info-title-text');
  const infoText = document.getElementById('info-text');

  wheelEl.addEventListener('click', (e) => {
    if (spinning) return;
    const rect = wheelEl.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = e.clientX - cx;
    const dy = e.clientY - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < rect.width * 0.11 || dist > rect.width / 2) return; // мимо колеса или по ступице

    const screenAngle = Math.atan2(dy, dx) * 180 / Math.PI;
    const localAngle = screenAngle - currentRotationDeg;
    const norm = (((localAngle + 90) % 360) + 360) % 360;
    const index = Math.floor(norm / segAngle) % prizes.length;

    openInfo(prizes[index]);
  });

  function openInfo(p) {
    if (tg?.HapticFeedback) tg.HapticFeedback.selectionChanged();
    infoTitleText.textContent = p.lines.join(' ');
    infoText.textContent = p.desc || '';
    if (p.img) {
      infoPhoto.src = p.img;
      infoPhoto.style.display = 'block';
      infoEmoji.style.display = 'none';
    } else {
      infoPhoto.style.display = 'none';
      infoEmoji.style.display = 'block';
      infoEmoji.textContent = p.emoji || '';
    }
    infoOverlay.classList.add('show');
  }
  function closeInfo() {
    infoOverlay.classList.remove('show');
  }

  function launchPetals() {
    const shades = ["#f4f4f2", "#c9c9cd", "#8c8c92"];
    for (let i = 0; i < 55; i++) {
      const el = document.createElement('div');
      el.className = 'petal';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.width = el.style.height = (6 + Math.random() * 6) + 'px';
      const shade = shades[Math.floor(Math.random() * shades.length)];
      el.style.background = shade;
      el.style.opacity = 0.85;
      el.style.borderRadius = "0 60% 0 60%";
      el.style.transform = `rotate(${Math.random()*360}deg)`;
      document.body.appendChild(el);
      const duration = 3000 + Math.random() * 2000;
      const drift = (Math.random() - 0.5) * 120;
      el.animate(
        [
          { transform: `translate(0,0) rotate(0deg)`, opacity: .9 },
          { transform: `translate(${drift}px, 100vh) rotate(${360 + Math.random()*360}deg)`, opacity: .7 }
        ],
        { duration, easing: 'ease-in' }
      );
      setTimeout(() => el.remove(), duration);
    }
  }
</script>

</body>
</html>
